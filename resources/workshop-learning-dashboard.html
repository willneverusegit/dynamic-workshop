<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Workshop — Learning Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0c10;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2333;
--cyan:#00e5ff;--green:#3fb950;--amber:#f0a500;--red:#f85149;
--text:#c9d1d9;--text2:#8b949e;--text3:#484f58;
--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
--sidebar-w:260px;--header-h:56px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;height:100vh}
/* scanline */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.015) 2px,rgba(0,229,255,.015) 4px)}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
a{color:var(--cyan);text-decoration:none}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--bg4);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
#logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--cyan);white-space:nowrap}
#logo .icon{width:28px;height:28px;border-radius:6px;background:var(--cyan);display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:16px;font-weight:700;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--cyan)}50%{box-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,229,255,.3)}}
#search-wrap{flex:1;max-width:420px;position:relative}
#search{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:6px;padding:7px 12px 7px 34px;color:var(--text);font-family:var(--mono);font-size:.85rem;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--cyan)}
#search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem}
#search-wrap kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--bg4);color:var(--text3);font-family:var(--mono);font-size:.7rem;padding:2px 6px;border-radius:3px}
#search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg3);border:1px solid var(--bg4);border-radius:6px;max-height:320px;overflow-y:auto;display:none;z-index:200}
#search-results .sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bg4);font-size:.85rem}
#search-results .sr-item:hover{background:var(--bg4)}
#search-results .sr-item .sr-type{font-family:var(--mono);font-size:.7rem;color:var(--text3);margin-right:8px}
#progress-stats{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:.8rem;white-space:nowrap}
#progress-stats .pbar{width:100px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
#progress-stats .pbar .fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--header-h);left:0;width:var(--sidebar-w);bottom:0;background:var(--bg2);border-right:1px solid var(--bg4);overflow-y:auto;padding:16px 0;z-index:90}
#sidebar .sb-label{font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:12px 16px 6px}
#sidebar .sb-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:.85rem;color:var(--text2);transition:all .15s;border-left:2px solid transparent}
#sidebar .sb-item:hover{background:var(--bg3);color:var(--text)}
#sidebar .sb-item.active{border-left-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05)}
#sidebar .sb-item.active.g{border-left-color:var(--green);color:var(--green);background:rgba(63,185,80,.05)}
#sidebar .sb-item .check{color:var(--green);font-size:.75rem;margin-left:auto}
#sidebar .sb-divider{height:1px;background:var(--bg4);margin:8px 16px}
#sidebar .sb-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.block1-dot{background:var(--cyan)}.block2-dot{background:var(--green)}

/* MAIN */
#main{margin-left:var(--sidebar-w);margin-top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto;display:flex;flex-direction:column}
#tab-bar{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--bg4);flex-shrink:0}
.tab{padding:10px 20px;font-family:var(--mono);font-size:.8rem;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
#content{flex:1;overflow-y:auto;padding:24px}
.view{display:none}.view.active{display:block}

/* CONCEPT MAP */
.cmap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:960px;margin:0 auto}
.cmap-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.cmap-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,229,255,.1)}
.cmap-card.b2:hover{border-color:var(--green);box-shadow:0 4px 20px rgba(63,185,80,.1)}
.cmap-card .cc-id{font-family:var(--mono);font-size:.7rem;color:var(--text3);margin-bottom:4px}
.cmap-card .cc-title{font-weight:600;font-size:.95rem;margin-bottom:8px}
.cmap-card .cc-tag{display:inline-block;font-family:var(--mono);font-size:.65rem;padding:2px 8px;border-radius:10px;border:1px solid var(--cyan);color:var(--cyan)}
.cmap-card.b2 .cc-tag{border-color:var(--green);color:var(--green)}
.cmap-arrow{text-align:center;padding:12px;font-family:var(--mono);font-size:.75rem;color:var(--text3);grid-column:1/-1}
.cmap-arrow::before{content:'▼ '}
.cmap-r3{grid-column:2/4}

/* MODULE EXPLORER */
.mod-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.mod-badge{font-family:var(--mono);font-size:.7rem;padding:4px 10px;border-radius:4px;font-weight:600}
.mod-badge.b1{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.mod-badge.b2{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.mod-title{font-size:1.4rem;font-weight:700}
.btn{font-family:var(--mono);font-size:.8rem;padding:6px 14px;border-radius:4px;border:1px solid var(--bg4);background:var(--bg3);color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.done{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.08)}
.mod-content h3{font-family:var(--mono);color:var(--cyan);font-size:1rem;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bg4)}
.mod-content p{line-height:1.7;margin-bottom:10px;color:var(--text2)}
.mod-content ul{margin:0 0 12px 20px;color:var(--text2);line-height:1.8}
.mod-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}
.mod-content th{text-align:left;font-family:var(--mono);color:var(--cyan);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--bg4);font-size:.8rem}
.mod-content td{padding:8px 12px;border-bottom:1px solid var(--bg4);color:var(--text2)}
.mod-content tr:hover td{background:rgba(0,229,255,.02)}
.analogy-box{border-left:3px solid var(--amber);background:rgba(240,165,0,.05);padding:14px 16px;border-radius:0 6px 6px 0;margin:14px 0;font-size:.9rem}
.analogy-box .ab-title{font-weight:600;color:var(--amber);margin-bottom:4px;font-size:.85rem}
.mod-content code{font-family:var(--mono);background:var(--bg4);padding:1px 5px;border-radius:3px;font-size:.85rem;color:var(--cyan)}
.mod-content pre{background:var(--bg);border:1px solid var(--bg4);border-radius:6px;padding:14px;overflow-x:auto;margin:12px 0;font-family:var(--mono);font-size:.8rem;line-height:1.6;color:var(--text2)}

/* FLASHCARDS */
.fc-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.fc-filters .fbtn{font-family:var(--mono);font-size:.75rem;padding:4px 10px;border-radius:12px;border:1px solid var(--bg4);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s}
.fc-filters .fbtn:hover,.fc-filters .fbtn.active{border-color:var(--cyan);color:var(--cyan)}
.fc-filters .fbtn.active{background:rgba(0,229,255,.08)}
.fc-count{font-family:var(--mono);font-size:.75rem;color:var(--text3);margin-left:auto}
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.fc-card{perspective:800px;height:200px;cursor:pointer}
.fc-card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc-card.flipped .fc-card-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;padding:16px;display:flex;flex-direction:column;border:1px solid var(--bg4)}
.fc-front{background:var(--bg3)}
.fc-back{background:var(--bg4);transform:rotateY(180deg)}
.fc-meta{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.fc-mod-tag{font-family:var(--mono);font-size:.65rem;color:var(--text3)}
.fc-cat{font-family:var(--mono);font-size:.6rem;padding:2px 6px;border-radius:8px;font-weight:500}
.fc-cat.concept{background:rgba(0,229,255,.1);color:var(--cyan)}
.fc-cat.command{background:rgba(63,185,80,.1);color:var(--green)}
.fc-cat.config{background:rgba(240,165,0,.1);color:var(--amber)}
.fc-cat.analogy{background:rgba(248,81,73,.1);color:var(--red)}
.fc-q{flex:1;font-size:.95rem;font-weight:500;line-height:1.5;display:flex;align-items:center}
.fc-a{flex:1;font-size:.85rem;color:var(--text2);line-height:1.6;display:flex;align-items:center}
.fc-hint{font-family:var(--mono);font-size:.65rem;color:var(--text3);text-align:center;margin-top:auto}

/* QUICK REF */
.qr-search{width:100%;max-width:400px;background:var(--bg3);border:1px solid var(--bg4);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:.85rem;outline:none;margin-bottom:20px}
.qr-search:focus{border-color:var(--cyan)}
.qr-section{margin-bottom:24px}
.qr-section h3{font-family:var(--mono);color:var(--cyan);font-size:.9rem;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bg4)}
.qr-section table{width:100%;border-collapse:collapse;font-size:.85rem}
.qr-section th{text-align:left;font-family:var(--mono);color:var(--text3);font-weight:500;padding:6px 12px;font-size:.75rem}
.qr-section td{padding:6px 12px;border-bottom:1px solid rgba(22,27,34,.8);color:var(--text2)}
.qr-section td code{font-family:var(--mono);color:var(--cyan);background:var(--bg);padding:1px 4px;border-radius:2px;font-size:.8rem}
.qr-row{transition:opacity .15s}
.qr-row.hidden{display:none}

/* ANALOGIES */
.ana-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.ana-card{background:var(--bg3);border:1px solid var(--bg4);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:16px;cursor:pointer;transition:all .2s}
.ana-card:hover{border-color:var(--amber);transform:translateY(-2px);box-shadow:0 4px 20px rgba(240,165,0,.08)}
.ana-icon{font-size:1.5rem;margin-bottom:8px}
.ana-concept{font-weight:600;font-size:1rem;margin-bottom:6px}
.ana-desc{font-size:.85rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.ana-ref{font-family:var(--mono);font-size:.7rem;color:var(--text3)}

/* RESPONSIVE */
@media(max-width:900px){
#sidebar{position:fixed;top:var(--header-h);left:0;right:0;bottom:auto;width:100%;height:auto;display:flex;overflow-x:auto;overflow-y:hidden;padding:8px;gap:4px;border-right:none;border-bottom:1px solid var(--bg4)}
#sidebar .sb-label{display:none}
#sidebar .sb-divider{display:none}
#sidebar .sb-item{white-space:nowrap;padding:6px 12px;border-left:none;border-bottom:2px solid transparent;font-size:.75rem}
#sidebar .sb-item.active{border-bottom-color:var(--cyan);border-left:none}
#main{margin-left:0;margin-top:calc(var(--header-h) + 48px)}
#logo span{display:none}
#progress-stats span.plabel{display:none}
}
</style>
</head>
<body>

<div id="header">
  <div id="logo"><div class="icon">CC</div><span>Workshop Dashboard</span></div>
  <div id="search-wrap">
    <span class="si">⌕</span>
    <input id="search" type="text" placeholder="Module, Befehle, Konzepte durchsuchen...">
    <kbd>Ctrl+K</kbd>
    <div id="search-results"></div>
  </div>
  <div id="progress-stats">
    <span class="plabel">Fortschritt</span>
    <span id="prog-text">0/9</span>
    <div class="pbar"><div class="fill" id="prog-fill" style="width:0%"></div></div>
    <span id="prog-pct">0%</span>
  </div>
</div>

<div id="sidebar"></div>

<div id="main">
  <div id="tab-bar">
    <div class="tab active" data-view="concept-map">Concept Map</div>
    <div class="tab" data-view="module-explorer">Module Explorer</div>
    <div class="tab" data-view="flashcards">Flashcards</div>
    <div class="tab" data-view="quick-ref">Quick Reference</div>
    <div class="tab" data-view="analogies">Security Analogien</div>
  </div>
  <div id="content">
    <div id="view-concept-map" class="view active"></div>
    <div id="view-module-explorer" class="view"></div>
    <div id="view-flashcards" class="view"></div>
    <div id="view-quick-ref" class="view"></div>
    <div id="view-analogies" class="view"></div>
  </div>
</div>

<script>
// ─── DATA ───
const modules = [
  {id:"1.1",title:"What is Claude Code?",block:1,content:`
<h3>Die vier Interfaces</h3>
<table><tr><th>Interface</th><th>Beschreibung</th><th>Anwendung</th></tr>
<tr><td>Web Chat</td><td>claude.ai im Browser</td><td>Quick Questions, Brainstorming</td></tr>
<tr><td>CLI</td><td>Terminal-basiert, volle Kontrolle</td><td>Development, Automation</td></tr>
<tr><td>Desktop/Web App</td><td>Claude Desktop mit MCP</td><td>GUI-Workflows</td></tr>
<tr><td>IDE Extension</td><td>VS Code, JetBrains</td><td>Inline Coding</td></tr></table>
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Consultant Modes</div>
Wie ein Security-Consultant: Telefon (Web Chat), Badge-Zugang (CLI), eigener Schreibtisch (Desktop), Pair Programming (IDE).</div>
<h3>Built-in Tools</h3>
<table><tr><th>Tool</th><th>Funktion</th><th>Permission</th></tr>
<tr><td><code>Read</code></td><td>Dateien lesen</td><td>Immer erlaubt</td></tr>
<tr><td><code>Glob</code></td><td>Datei-Suche per Pattern</td><td>Immer erlaubt</td></tr>
<tr><td><code>Grep</code></td><td>Inhaltssuche (ripgrep)</td><td>Immer erlaubt</td></tr>
<tr><td><code>Edit</code></td><td>Gezielte Ersetzungen</td><td>Bestaetigung noetig</td></tr>
<tr><td><code>Write</code></td><td>Neue Dateien schreiben</td><td>Bestaetigung noetig</td></tr>
<tr><td><code>Bash</code></td><td>Shell-Befehle ausfuehren</td><td>Bestaetigung noetig</td></tr>
<tr><td><code>WebSearch</code></td><td>Websuche</td><td>Immer erlaubt</td></tr>
<tr><td><code>Agent</code></td><td>Sub-Agent starten</td><td>Bestaetigung noetig</td></tr></table>
<h3>Permission Modes</h3>
<table><tr><th>Mode</th><th>Verhalten</th><th>Analogy</th></tr>
<tr><td><code>default</code></td><td>Fragt bei Schreibzugriff</td><td>Besucher mit Begleitung</td></tr>
<tr><td><code>acceptEdits</code></td><td>Dateiaenderungen ohne Frage</td><td>Mitarbeiter-Badge</td></tr>
<tr><td><code>plan</code></td><td>Nur Lesen + Planen</td><td>Auditor (read-only)</td></tr>
<tr><td><code>auto</code></td><td>Alles ohne Frage</td><td>Admin-Zugang</td></tr>
<tr><td><code>dontAsk</code></td><td>Ablehnen statt Fragen</td><td>Deny-by-default Firewall</td></tr>
<tr><td><code>bypassPermissions</code></td><td>Keine Einschraenkungen</td><td>Physischer Schluessel</td></tr></table>
<h3>Modelle</h3>
<table><tr><th>Modell</th><th>Context</th><th>Staerke</th></tr>
<tr><td>Opus 4.6</td><td>1M Tokens</td><td>Deep Reasoning, komplexe Aufgaben</td></tr>
<tr><td>Sonnet 4.6</td><td>1M Tokens</td><td>Everyday Coding, Balance Speed/Quality</td></tr>
<tr><td>Haiku 4.5</td><td>200K Tokens</td><td>Quick Tasks, Sub-Agents</td></tr></table>`},
  {id:"1.2",title:"Context & Memory",block:1,content:`
<h3>Context Window</h3>
<p>Claude Code nutzt ein <strong>1M Token Context Window</strong> — das entspricht ca. 3.000 Seiten Text. Bei Ueberschreitung wird automatisch komprimiert.</p>
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Kontrollraum-Monitore</div>
Wie ein Kontrollraum mit 200 Kameras aber nur 20 Bildschirmen: Claude sieht immer nur einen Ausschnitt, aber kann umschalten.</div>
<h3>CLAUDE.md — Die Konfigurationsdatei</h3>
<ul>
<li><code>./CLAUDE.md</code> — Projekt-spezifisch (im Repo)</li>
<li><code>~/.claude/CLAUDE.md</code> — User-global</li>
<li>Wird bei jedem Gespraechsstart automatisch geladen</li>
<li>Enthaelt: Konventionen, Learnings, Projektstruktur</li>
</ul>
<h3>Memory Types</h3>
<table><tr><th>Typ</th><th>Speicherort</th><th>Inhalt</th></tr>
<tr><td>User Memory</td><td><code>~/.claude/CLAUDE.md</code></td><td>Globale Praeferenzen</td></tr>
<tr><td>Feedback Memory</td><td>Automatisch</td><td>Korrekturen aus Gespraechen</td></tr>
<tr><td>Project Memory</td><td><code>./CLAUDE.md</code></td><td>Projekt-Regeln und Learnings</td></tr>
<tr><td>Reference Memory</td><td>Externe Dateien</td><td>Docs, READMEs, Specs</td></tr></table>
<h3>Wichtige Commands</h3>
<table><tr><th>Command</th><th>Funktion</th></tr>
<tr><td><code>/context</code></td><td>Zeigt aktuellen Context-Verbrauch</td></tr>
<tr><td><code>/compact</code></td><td>Komprimiert Konversation</td></tr>
<tr><td><code>/memory</code></td><td>Memory-Eintraege verwalten</td></tr>
<tr><td><code>/rewind</code></td><td>Letzte Aktion rueckgaengig</td></tr></table>`},
  {id:"1.3",title:"Effective Prompting",block:1,content:`
<h3>Klarheit statt Cleverness</h3>
<p>Spezifische Anweisungen liefern bessere Ergebnisse als vage Bitten. Je praeziser der Prompt, desto praeziser das Ergebnis.</p>
<pre>// ❌ Schlecht:
"Fix the bug"

// ✅ Gut:
"In src/auth.ts the validateToken function returns true
for expired tokens. Fix the expiry check and add a test."</pre>
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Auftragszettel</div>
Wie ein Wartungsauftrag: "Kartenleser CR-047 an Panel P-03 austauschen" statt "Mach mal was am Eingang".</div>
<h3>Iteratives Pattern</h3>
<p>Das empfohlene Vorgehen fuer komplexe Aufgaben:</p>
<ul>
<li><strong>Explain</strong> — Situation beschreiben</li>
<li><strong>Propose</strong> — Claude erstellt Plan</li>
<li><strong>Refine</strong> — Plan gemeinsam anpassen</li>
<li><strong>Execute</strong> — Umsetzung starten</li>
</ul>
<h3>Plan Mode</h3>
<p>Mit <code>/plan</code> oder <code>Shift+Tab</code> in den Plan-Modus wechseln. Claude liest und analysiert, schreibt aber nichts.</p>
<h3>Prompt-Patterns</h3>
<table><tr><th>Pattern</th><th>Beispiel</th></tr>
<tr><td>Read X first</td><td>"Read src/config.ts before making changes"</td></tr>
<tr><td>Show plan</td><td>"Show me your plan before coding"</td></tr>
<tr><td>Only change X</td><td>"Only modify the auth module, nothing else"</td></tr>
<tr><td>Test by running Z</td><td>"Verify by running npm test"</td></tr>
<tr><td>Explain what you did</td><td>"After changes, explain what you changed and why"</td></tr></table>`},
  {id:"1.4",title:"Git Integration",block:1,content:`
<h3>Built-in Git Operations</h3>
<p>Claude Code versteht Git nativ und kann Commits, Branches, Diffs und PRs erstellen und verwalten.</p>
<h3>Wichtige Commands</h3>
<table><tr><th>Command</th><th>Funktion</th></tr>
<tr><td><code>/diff</code></td><td>Zeigt aktuelle Aenderungen</td></tr>
<tr><td><code>/rewind</code></td><td>Setzt letzte Aenderung zurueck</td></tr>
<tr><td><code>/pr-comments</code></td><td>Zeigt PR-Kommentare</td></tr>
<tr><td><code>/commit</code></td><td>Erstellt Commit mit Message</td></tr></table>
<h3>PR-Workflow (7 Schritte)</h3>
<ul>
<li>1. Branch erstellen oder wechseln</li>
<li>2. Aenderungen vornehmen</li>
<li>3. Tests ausfuehren</li>
<li>4. <code>/diff</code> pruefen</li>
<li>5. Commit erstellen</li>
<li>6. PR mit <code>gh pr create</code> oeffnen</li>
<li>7. Review-Kommentare bearbeiten</li>
</ul>
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Worktree als Test-Labor</div>
Ein Git Worktree ist wie ein isoliertes Test-Labor: Man kann Aenderungen testen, ohne das Produktivsystem zu beruehren.</div>
<h3>Wann Worktrees nutzen?</h3>
<table><tr><th>Situation</th><th>Empfehlung</th></tr>
<tr><td>Schneller Bugfix</td><td>Normaler Branch reicht</td></tr>
<tr><td>Paralleles Feature + Bugfix</td><td>Worktree empfohlen</td></tr>
<tr><td>Langlebiger Experiment-Branch</td><td>Worktree ideal</td></tr>
<tr><td>CI/CD Pipeline testen</td><td>Worktree + separate Shell</td></tr></table>`},
  {id:"2.1",title:"Skills & Commands",block:2,content:`
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: SOPs und Alarm-Knoepfe</div>
Skills sind wie SOPs (Standard Operating Procedures): dokumentierte Ablaeufe, die bei Bedarf ausgefuehrt werden. Commands sind wie Alarm-Knoepfe: ein Druck, sofortige Aktion.</div>
<h3>Skill Anatomy</h3>
<p>Eine Skill-Datei ist eine Markdown-Datei mit YAML-Frontmatter:</p>
<pre>---
description: "Erstellt Security-Audit Report"
disable-model-invocation: false
allowed-tools: ["Read", "Grep", "Glob"]
context: fork
agent:
  model: haiku
---
# Security Audit Skill
Fuehre ein Security-Audit durch...</pre>
<h3>Frontmatter-Felder</h3>
<table><tr><th>Feld</th><th>Beschreibung</th></tr>
<tr><td><code>disable-model-invocation</code></td><td>Skill kann nicht von Claude selbst aufgerufen werden</td></tr>
<tr><td><code>allowed-tools</code></td><td>Beschraenkt verfuegbare Tools</td></tr>
<tr><td><code>context: fork</code></td><td>Eigener Context (isoliert)</td></tr>
<tr><td><code>agent: model</code></td><td>Welches Modell der Skill nutzt</td></tr></table>
<h3>Bundled Skills</h3>
<table><tr><th>Skill</th><th>Funktion</th></tr>
<tr><td><code>/batch</code></td><td>Mehrere Aufgaben parallel abarbeiten</td></tr>
<tr><td><code>/debug</code></td><td>Systematisches Debugging</td></tr>
<tr><td><code>/loop</code></td><td>Iterative Verbesserung</td></tr>
<tr><td><code>/simplify</code></td><td>Code vereinfachen</td></tr></table>`},
  {id:"2.2",title:"Hooks",block:2,content:`
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Zutrittskontroll-Sensoren</div>
Hooks sind wie Sensoren an Tueren: Sie reagieren automatisch auf Ereignisse (Tuer oeffnet → Kamera aktiviert, Person tritt ein → Badge pruefen).</div>
<h3>Hook Events</h3>
<table><tr><th>Event</th><th>Wann</th><th>Beispiel</th></tr>
<tr><td><code>PreToolUse</code></td><td>Vor Tool-Ausfuehrung</td><td>Bash-Befehle validieren</td></tr>
<tr><td><code>PostToolUse</code></td><td>Nach Tool-Ausfuehrung</td><td>Ergebnis loggen</td></tr>
<tr><td><code>Stop</code></td><td>Wenn Claude fertig ist</td><td>Auto-Commit, Notification</td></tr></table>
<h3>Execution Types</h3>
<table><tr><th>Typ</th><th>Beschreibung</th></tr>
<tr><td><code>command</code></td><td>Shell-Befehl ausfuehren</td></tr>
<tr><td><code>http</code></td><td>HTTP-Request senden</td></tr>
<tr><td><code>prompt</code></td><td>Prompt an Claude senden</td></tr>
<tr><td><code>agent</code></td><td>Sub-Agent starten</td></tr></table>
<h3>Config Beispiel</h3>
<pre>{
  "hooks": {
    "PreToolUse": [{
      "tool": "Bash",
      "type": "command",
      "command": "check-safety.sh $INPUT"
    }]
  }
}</pre>
<h3>Circuit Breaker Pattern</h3>
<p>Hooks koennen eine Aktion blockieren, indem sie einen Fehlercode zurueckgeben. So verhindert man gefaehrliche Operationen automatisch — wie ein Sicherungsschalter, der bei Ueberlast auslöest.</p>`},
  {id:"2.3",title:"Plugins",block:2,content:`
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Sicherheitsmodul</div>
Ein Plugin ist wie ein Sicherheitsmodul, das man in eine Anlage einbaut: Es bringt eigene Skills, Hooks und Konfiguration mit — ein Komplettpaket fuer einen bestimmten Zweck.</div>
<h3>Plugin-Struktur</h3>
<pre>~/.claude/plugins/my-plugin/
├── plugin.json        # Metadaten + Konfiguration
├── skills/
│   └── audit/
│       └── SKILL.md   # Skill-Definition
├── agents/
│   └── reviewer.md    # Agent-Definition
└── commands/
    └── scan.md        # Command-Definition</pre>
<h3>Plugin Scopes</h3>
<table><tr><th>Scope</th><th>Ort</th><th>Sichtbarkeit</th></tr>
<tr><td><code>user</code></td><td><code>~/.claude/plugins/</code></td><td>Alle Projekte des Users</td></tr>
<tr><td><code>project</code></td><td><code>.claude/plugins/</code></td><td>Nur dieses Projekt</td></tr>
<tr><td><code>local</code></td><td>Beliebig, per Symlink</td><td>Per Konfiguration</td></tr>
<tr><td><code>managed</code></td><td>Marketplace</td><td>Von Anthropic verwaltet</td></tr></table>
<h3>Supply Chain Risks</h3>
<ul>
<li>Plugins koennen beliebigen Code via Hooks ausfuehren</li>
<li>Keine automatische Signatur-Pruefung</li>
<li>SKILL.md-Dateien koennen Prompt Injection enthalten</li>
<li>Empfehlung: Nur vertrauenswuerdige Quellen, Code-Review vor Installation</li>
</ul>`},
  {id:"2.4",title:"MCP",block:2,content:`
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Gebaeudeleittechnik</div>
MCP ist wie eine Gebaeudeleittechnik (BMS): Ein standardisiertes Protokoll, ueber das verschiedene Systeme (Kameras, Tueren, Alarme) miteinander kommunizieren.</div>
<h3>Transports</h3>
<table><tr><th>Transport</th><th>Status</th><th>Beschreibung</th></tr>
<tr><td><code>HTTP (Streamable)</code></td><td>Empfohlen</td><td>Standard-Transport, zuverlaessig</td></tr>
<tr><td><code>stdio</code></td><td>Stabil</td><td>Fuer lokale Prozesse</td></tr>
<tr><td><code>SSE</code></td><td>Deprecated</td><td>Durch HTTP Streamable ersetzt</td></tr></table>
<h3>MCP Server</h3>
<table><tr><th>Server</th><th>Funktion</th></tr>
<tr><td>Playwright</td><td>Browser-Automation, Web Scraping</td></tr>
<tr><td>Slack</td><td>Nachrichten senden/lesen</td></tr>
<tr><td>Databases</td><td>SQL-Queries auf DB ausfuehren</td></tr>
<tr><td>Context7</td><td>Aktuelle Library-Docs abrufen</td></tr></table>
<h3>Output Limits</h3>
<table><tr><th>Limit</th><th>Wert</th></tr>
<tr><td>Warning</td><td>10.000 Zeichen</td></tr>
<tr><td>Max Default</td><td>25.000 Zeichen</td></tr>
<tr><td>Override moeglich</td><td>500.000 Zeichen</td></tr></table>
<h3>Security Risks</h3>
<ul>
<li>MCP Server haben Zugriff auf lokale Ressourcen</li>
<li>Keine eingebaute Authentifizierung zwischen Client und Server</li>
<li>Tool-Ergebnisse koennen Prompt Injection enthalten</li>
<li>OAuth-Flow fuer Remote-Server noch nicht ueberall implementiert</li>
</ul>`},
  {id:"2.5",title:"RAG & NotebookLM",block:2,content:`
<div class="analogy-box"><div class="ab-title">🔒 Security Analogy: Gebaeudeplaene vs. Allgemeinwissen</div>
RAG ist wie der Unterschied zwischen allgemeinem Security-Wissen und den spezifischen Gebaeudeplaenen einer Anlage: Erst mit den konkreten Plaenen kann man effektiv arbeiten.</div>
<h3>Was RAG loest</h3>
<p>Retrieval-Augmented Generation verbindet LLMs mit externen Wissensquellen. Statt sich auf Trainingsdaten zu verlassen, werden relevante Dokumente zur Laufzeit abgerufen.</p>
<h3>NotebookLM Workflow</h3>
<ul>
<li>1. Quellen in NotebookLM hochladen (PDFs, Docs, URLs)</li>
<li>2. Notebook mit <code>notebooklm use &lt;id&gt;</code> aktivieren</li>
<li>3. Fragen mit <code>notebooklm ask "..."</code> stellen</li>
<li>4. Antworten basieren ausschliesslich auf den hochgeladenen Quellen</li>
</ul>
<h3>Use Cases</h3>
<table><tr><th>Use Case</th><th>Beschreibung</th></tr>
<tr><td>Interne Docs</td><td>Firmen-Wiki, Confluence, interne Standards</td></tr>
<tr><td>API-Docs</td><td>Aktuelle API-Referenzen statt veralteter Trainingsdaten</td></tr>
<tr><td>Research</td><td>Paper, Reports, Analyse-Ergebnisse</td></tr>
<tr><td>Compliance</td><td>Regulatorische Vorgaben, Audit-Standards</td></tr></table>`}
];

  modules.filter(m=>m.block===1).forEach(m=>{
    const active = currentView==='module-explorer' && currentModule===m.id;
    const cls = active ? 'sb-item active' : 'sb-item';
    h += `<div class="${cls}" data-mod="${m.id}"><span class="dot block1-dot"></span>${m.id} ${m.title}${completed[m.id]?'<span class="check">✓</span>':''}</div>`;
  });
  h += '<div class="sb-divider"></div><div class="sb-label">Block 2 — Ecosystem</div>';
  modules.filter(m=>m.block===2).forEach(m=>{
    const active = currentView==='module-explorer' && currentModule===m.id;
    const cls = active ? 'sb-item active g' : 'sb-item';
    h += `<div class="${cls}" data-mod="${m.id}"><span class="dot block2-dot"></span>${m.id} ${m.title}${completed[m.id]?'<span class="check">✓</span>':''}</div>`;
  });
  h += '<div class="sb-divider"></div><div class="sb-label">Views</div>';
  ['concept-map','flashcards','quick-ref','analogies'].forEach(v=>{
    const names = {'concept-map':'Concept Map','flashcards':'Flashcards','quick-ref':'Quick Reference','analogies':'Security Analogien'};
    h += `<div class="sb-item${currentView===v?' active':''}" data-view="${v}">${names[v]}</div>`;
  });
  sb.innerHTML = h;
  sb.querySelectorAll('[data-mod]').forEach(el=>el.addEventListener('click',()=>navigateToModule(el.dataset.mod)));
  sb.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>switchView(el.dataset.view)));
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.view===currentView);
  });
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.toggle('active', v.id==='view-'+currentView);
  });
}

function switchView(v) {
  currentView = v;
  renderTabs();
  renderSidebar();
}

function navigateToModule(id) {
  currentModule = id;
  currentView = 'module-explorer';
  renderTabs();
  renderSidebar();
  renderModuleExplorer();
  document.getElementById('content').scrollTop = 0;
}

function renderConceptMap() {
  const el = document.getElementById('view-concept-map');
  let h = '<div class="cmap-grid">';
  modules.filter(m=>m.block===1).forEach(m=>{
    h += `<div class="cmap-card" data-mod="${m.id}"><div class="cc-id">${m.id}</div><div class="cc-title">${m.title}</div><span class="cc-tag">Block 1</span></div>`;
  });
  h += '<div class="cmap-arrow">Foundations bilden die Basis fuer das Ecosystem</div>';
  modules.filter(m=>m.block===2 && m.id!=='2.5').forEach(m=>{
    h += `<div class="cmap-card b2" data-mod="${m.id}"><div class="cc-id">${m.id}</div><div class="cc-title">${m.title}</div><span class="cc-tag">Block 2</span></div>`;
  });
  h += '<div class="cmap-arrow">MCP + Skills ermoeglichen Wissensmanagement</div>';
  const rag = modules.find(m=>m.id==='2.5');
  h += `<div class="cmap-card b2 cmap-r3" data-mod="2.5"><div class="cc-id">2.5</div><div class="cc-title">${rag.title}</div><span class="cc-tag">Block 2</span></div>`;
  h += '</div>';
  el.innerHTML = h;
  el.querySelectorAll('.cmap-card').forEach(c=>c.addEventListener('click',()=>navigateToModule(c.dataset.mod)));
}

function renderModuleExplorer() {
  const el = document.getElementById('view-module-explorer');
  if (!currentModule) { currentModule = '1.1'; }
  const mod = modules.find(m=>m.id===currentModule);
  if (!mod) return;
  const bc = mod.block===1?'b1':'b2';
  const isDone = completed[mod.id];
  el.innerHTML = `<div class="mod-header">
    <span class="mod-badge ${bc}">Block ${mod.block}</span>
    <span class="mod-title">${mod.id} — ${mod.title}</span>
    <button class="btn ${isDone?'done':''}" id="mark-read">${isDone?'✓ Gelesen':'Als gelesen markieren'}</button>
  </div><div class="mod-content">${mod.content}</div>`;
  document.getElementById('mark-read').addEventListener('click',()=>{
    completed[mod.id] = !completed[mod.id];
    localStorage.setItem('ws-completed', JSON.stringify(completed));
    renderModuleExplorer();
    renderSidebar();
    updateProgress();
  });
}

function renderFlashcards() {
  const el = document.getElementById('view-flashcards');
  const cats = ['all','concept','command','config','analogy'];
  const catLabels = {all:'Alle',concept:'Concept',command:'Command',config:'Config',analogy:'Analogy'};
  const modIds = [...new Set(flashcards.map(f=>f.mod))];
  const filtered = flashcards.filter(f=>{
    if (fcCatFilter!=='all' && f.cat!==fcCatFilter) return false;
    if (fcModFilter!=='all' && f.mod!==fcModFilter) return false;
    return true;
  });
  let h = '<div class="fc-filters">';
  cats.forEach(c=>{
    h += `<button class="fbtn${fcCatFilter===c?' active':''}" data-cat="${c}">${catLabels[c]}</button>`;
  });
  h += '<span style="color:var(--text3);margin:0 4px">|</span>';
  h += `<button class="fbtn${fcModFilter==='all'?' active':''}" data-fmod="all">Alle</button>`;
  modIds.forEach(id=>{
    h += `<button class="fbtn${fcModFilter===id?' active':''}" data-fmod="${id}">${id}</button>`;
  });
  h += `<span class="fc-count">${filtered.length} Karten</span></div>`;
  h += '<div class="fc-grid">';
  filtered.forEach((f,i)=>{
    h += `<div class="fc-card" data-idx="${i}"><div class="fc-card-inner">
      <div class="fc-front"><div class="fc-meta"><span class="fc-mod-tag">${f.mod}</span><span class="fc-cat ${f.cat}">${f.cat}</span></div><div class="fc-q">${f.q}</div><div class="fc-hint">Klicken zum Umdrehen</div></div>
      <div class="fc-back"><div class="fc-meta"><span class="fc-mod-tag">${f.mod}</span></div><div class="fc-a">${f.a}</div><div class="fc-hint">Klicken zum Zurueckdrehen</div></div>
    </div></div>`;
  });
  h += '</div>';
  el.innerHTML = h;
  el.querySelectorAll('.fc-card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('flipped')));
  el.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{fcCatFilter=b.dataset.cat;renderFlashcards();}));
  el.querySelectorAll('[data-fmod]').forEach(b=>b.addEventListener('click',()=>{fcModFilter=b.dataset.fmod;renderFlashcards();}));
}

function renderQuickRef() {
  const el = document.getElementById('view-quick-ref');
  let h = '<input class="qr-search" id="qr-search" type="text" placeholder="Befehle und Shortcuts durchsuchen...">';
  quickRef.forEach(s=>{
    h += `<div class="qr-section"><h3>${s.section}</h3><table><tr><th>Befehl / Shortcut</th><th>Beschreibung</th></tr>`;
    s.rows.forEach(r=>{
      h += `<tr class="qr-row"><td>${r[0]}</td><td>${r[1]}</td></tr>`;
    });
    h += '</table></div>';
  });
  el.innerHTML = h;
  document.getElementById('qr-search').addEventListener('input', e=>{
    const q = e.target.value.toLowerCase();
    el.querySelectorAll('.qr-row').forEach(r=>{
      const text = r.textContent.toLowerCase();
      r.classList.toggle('hidden', q && !text.includes(q));
    });
  });
}

function renderAnalogies() {
  const el = document.getElementById('view-analogies');
  let h = '<div class="ana-grid">';
  analogies.forEach(a=>{
    h += `<div class="ana-card" data-mod="${a.mod}"><div class="ana-icon">${a.icon}</div><div class="ana-concept">${a.concept}</div><div class="ana-desc">${a.desc}</div><div class="ana-ref">→ Modul ${a.mod}</div></div>`;
  });
  h += '</div>';
  el.innerHTML = h;
  el.querySelectorAll('.ana-card').forEach(c=>c.addEventListener('click',()=>navigateToModule(c.dataset.mod)));
}

function updateProgress() {
  const total = modules.length;
  const done = modules.filter(m=>completed[m.id]).length;
  const pct = Math.round(done/total*100);
  document.getElementById('prog-text').textContent = `${done}/${total}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
}

// ─── SEARCH ───
function buildSearchIndex() {
  const items = [];
  modules.forEach(m=>{
    items.push({type:'Modul',text:`${m.id} ${m.title}`,action:()=>navigateToModule(m.id)});
    // extract text from content
    const tmp = document.createElement('div');
    tmp.innerHTML = m.content;
    tmp.querySelectorAll('td,li,p').forEach(el=>{
      const t = el.textContent.trim();
      if (t.length > 10 && t.length < 120) items.push({type:`Modul ${m.id}`,text:t,action:()=>navigateToModule(m.id)});
    });
  });
  flashcards.forEach(f=>{
    items.push({type:'Flashcard',text:f.q,action:()=>{fcCatFilter='all';fcModFilter='all';switchView('flashcards');renderFlashcards();}});
  });
  quickRef.forEach(s=>{
    s.rows.forEach(r=>{
      const tmp = document.createElement('div');tmp.innerHTML=r[0];
      items.push({type:'Reference',text:`${tmp.textContent} — ${r[1]}`,action:()=>switchView('quick-ref')});
    });
  });
  analogies.forEach(a=>{
    items.push({type:'Analogy',text:`${a.concept}: ${a.desc}`,action:()=>navigateToModule(a.mod)});
  });
  return items;
}

let searchIndex = null;
function doSearch(q) {
  if (!searchIndex) searchIndex = buildSearchIndex();
  const res = document.getElementById('search-results');
  if (!q) { res.style.display='none'; return; }
  q = q.toLowerCase();
  const matches = searchIndex.filter(i=>i.text.toLowerCase().includes(q)).slice(0,12);
  if (!matches.length) { res.style.display='none'; return; }
  res.style.display='block';
  res.innerHTML = matches.map((m,i)=>`<div class="sr-item" data-si="${i}"><span class="sr-type">[${m.type}]</span>${m.text}</div>`).join('');
  res.querySelectorAll('.sr-item').forEach((el,i)=>el.addEventListener('click',()=>{
    matches[i].action();
    res.style.display='none';
    document.getElementById('search').value='';
  }));
}

document.getElementById('search').addEventListener('input', e=>doSearch(e.target.value));
document.getElementById('search').addEventListener('focus', e=>{ if(e.target.value) doSearch(e.target.value); });
document.addEventListener('click', e=>{ if(!e.target.closest('#search-wrap')) document.getElementById('search-results').style.display='none'; });
document.addEventListener('keydown', e=>{
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); document.getElementById('search').focus(); }
});

// ─── TAB CLICKS ───
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  const v = t.dataset.view;
  if (v==='module-explorer' && !currentModule) currentModule='1.1';
  switchView(v);
  if (v==='module-explorer') renderModuleExplorer();
}));

// ─── INIT ───
render();
</script>
</body>
</html>
